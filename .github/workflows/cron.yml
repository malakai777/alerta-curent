name: Verificare POD Curent
on:
  schedule:
    - cron: '0 18 * * *' # Rulează zilnic la ora 21:00 (ora României)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalare Playwright
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Executa scriptul
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COD_POD: "RO001E110447409"
        run: python main.py
        
